<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faraone Nicola Fabio | Official Space</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --accent-color: #ffffff;
            --card-bg: #141416;
            --border-color: #232326;
            --text-color: #ffffff;
            --text-secondary: #a0a0a5;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 40px 20px;
            text-align: center;
        }
        .profile-icon {
            width: 80px;
            height: 80px;
            background: #232326;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .contact-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 16px;
            text-decoration: none;
            color: var(--text-color);
            font-weight: 600;
            display: block;
            transition: background 0.2s;
        }
        .contact-btn:active {
            background: #1c1c1f;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-icon">👑</div>
        <h1>Faraone Nicola Fabio</h1>
        <p class="subtitle">Spazio Digitale Personale</p>
        
        <div class="links-container">
            <!-- Bottone Email -->
            <a href="mailto:tua-email@esempio.com" class="contact-btn">
                Contatto Email ✉️
            </a>
            
            <!-- Puoi aggiungere un social o lasciarlo così -->
            <a href="#" class="contact-btn" style="color: var(--text-secondary); font-weight: normal;">
                Sezione in aggiornamento...
            </a>
        </div>
        
        <div class="footer">
            &copy; 2026 Faraone Nicola Fabio.
        </div>
    </div>

</body>
</html>
